<svg width="680" height="1022" viewBox="0 0 680 1022" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Diagrama de clases UML completo: roles, ternaria de reservas, disponibilidad y autenticación</title>
<desc>Usuario se especializa en Admin y User (generalización disjunta y completa) con operaciones de login, logout y registro. Recurso incluye una operación de disponibilidad. Relación ternaria entre Usuario, Recurso y Fecha mediante el rombo "Se_reserva", con la clase de asociación Reserva (atributos y operaciones cancelar/eliminar) unida por línea discontinua. Notas explican las peticiones a base de datos.</desc>

<rect x="0" y="0" width="680" height="1022" fill="white"/>

<!-- ===== Usuario (superclase) ===== -->
<rect x="240" y="40" width="200" height="176" fill="white" stroke="black" stroke-width="1"/>
<line x1="240" y1="68" x2="440" y2="68" stroke="black" stroke-width="1"/>
<line x1="240" y1="150" x2="440" y2="150" stroke="black" stroke-width="1"/>
<text x="340" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="black">Usuario</text>
<text x="252" y="86" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- id : int</text>
<text x="252" y="102" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- nombre : String</text>
<text x="252" y="118" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- email : String</text>
<text x="252" y="134" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- password : String</text>
<text x="252" y="168" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ login() : boolean</text>
<text x="252" y="184" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ logout() : void</text>
<text x="252" y="200" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ registrar() : Usuario</text>

<!-- Nota: autenticación -->
<path d="M460,50 H616 L630,64 V146 H460 Z" fill="white" stroke="black" stroke-width="1"/>
<path d="M616,50 V64 H630" fill="none" stroke="black" stroke-width="1"/>
<text x="472" y="72" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">login(): valida usuario</text>
<text x="472" y="86" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">y crea sesión httpOnly</text>
<text x="472" y="100" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">logout(): borra sesión</text>
<text x="472" y="114" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">registrar(): INSERT</text>
<text x="472" y="128" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">INTO usuarios</text>
<line x1="440" y1="128" x2="460" y2="98" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Generalización Usuario -> Admin / User -->
<polygon points="340,216 322,236 358,236" fill="white" stroke="black" stroke-width="1"/>
<line x1="340" y1="236" x2="340" y2="256" stroke="black" stroke-width="1"/>
<line x1="340" y1="256" x2="200" y2="276" stroke="black" stroke-width="1"/>
<line x1="340" y1="256" x2="480" y2="276" stroke="black" stroke-width="1"/>
<text x="352" y="249" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="black">{disjoint, complete}</text>

<!-- Admin -->
<rect x="100" y="276" width="200" height="78" fill="white" stroke="black" stroke-width="1"/>
<line x1="100" y1="304" x2="300" y2="304" stroke="black" stroke-width="1"/>
<text x="200" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="black">Admin</text>
<text x="112" y="322" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ aprobarReserva() : void</text>
<text x="112" y="338" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ eliminarReserva() : void</text>

<!-- User -->
<rect x="380" y="276" width="200" height="78" fill="white" stroke="black" stroke-width="1"/>
<line x1="380" y1="304" x2="580" y2="304" stroke="black" stroke-width="1"/>
<text x="480" y="294" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="black">User</text>
<text x="392" y="322" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ reservarSala() : Reserva</text>
<text x="392" y="338" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ cancelarReserva() : void</text>

<!-- ===== Categoria ===== -->
<rect x="455" y="394" width="180" height="62" fill="white" stroke="black" stroke-width="1"/>
<line x1="455" y1="422" x2="635" y2="422" stroke="black" stroke-width="1"/>
<text x="545" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="black">Categoria</text>
<text x="467" y="440" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- nombre : String</text>

<!-- ===== Recurso ===== -->
<rect x="455" y="506" width="180" height="128" fill="white" stroke="black" stroke-width="1"/>
<line x1="455" y1="534" x2="635" y2="534" stroke="black" stroke-width="1"/>
<line x1="455" y1="600" x2="635" y2="600" stroke="black" stroke-width="1"/>
<text x="545" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="black">Recurso</text>
<text x="467" y="552" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- nombre : String</text>
<text x="467" y="568" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- ubicacion : String</text>
<text x="467" y="584" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- capacidad : int</text>
<text x="467" y="618" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ disponible() : bool</text>

<!-- Pertenece (Categoria-Recurso) -->
<line x1="545" y1="456" x2="545" y2="506" stroke="black" stroke-width="1"/>
<text x="553" y="470" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">1</text>
<text x="553" y="486" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">Pertenece</text>
<text x="553" y="502" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">*</text>

<!-- Nota: disponibilidad -->
<path d="M240,540 H416 L430,554 V624 H240 Z" fill="white" stroke="black" stroke-width="1"/>
<path d="M416,540 V554 H430" fill="none" stroke="black" stroke-width="1"/>
<text x="252" y="562" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">Comprueba solapamiento</text>
<text x="252" y="576" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">de horarios para la</text>
<text x="252" y="590" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">misma sala y fecha</text>
<text x="252" y="604" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">en la tabla reservas</text>
<line x1="430" y1="582" x2="455" y2="570" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>

<!-- ===== Conectores largos hacia la relación ternaria ===== -->
<path d="M240,128 L70,128 L70,754 L283,754" fill="none" stroke="black" stroke-width="1"/>
<line x1="545" y1="634" x2="397" y2="754" stroke="black" stroke-width="1"/>

<!-- ===== Rombo ternario ===== -->
<polygon points="340,714 397,754 340,794 283,754" fill="white" stroke="black" stroke-width="1.2"/>
<text x="340" y="758" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">Se_reserva</text>

<text x="230" y="742" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">*</text>
<text x="430" y="704" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">*</text>
<text x="355" y="798" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">0..*</text>

<line x1="340" y1="794" x2="340" y2="806" stroke="black" stroke-width="1"/>

<!-- ===== Fecha ===== -->
<rect x="275" y="806" width="130" height="62" fill="white" stroke="black" stroke-width="1"/>
<line x1="275" y1="834" x2="405" y2="834" stroke="black" stroke-width="1"/>
<text x="340" y="820" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="black">Fecha</text>
<text x="287" y="852" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- fecha : Date</text>

<!-- ===== Reserva (clase de asociación) ===== -->
<rect x="455" y="714" width="180" height="144" fill="white" stroke="black" stroke-width="1"/>
<line x1="455" y1="742" x2="635" y2="742" stroke="black" stroke-width="1"/>
<line x1="455" y1="808" x2="635" y2="808" stroke="black" stroke-width="1"/>
<text x="545" y="728" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="black">Reserva</text>
<text x="467" y="760" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- hora_inicio : Time</text>
<text x="467" y="776" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- hora_fin : Time</text>
<text x="467" y="792" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">- estado : String</text>
<text x="467" y="826" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ cancelar() : void</text>
<text x="467" y="842" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">+ eliminar() : void</text>

<!-- línea discontinua rombo -> Reserva -->
<line x1="368.5" y1="774" x2="455" y2="786" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>

<!-- Nota: peticiones a BD en cancelar/eliminar -->
<path d="M455,874 H621 L635,888 V982 H455 Z" fill="white" stroke="black" stroke-width="1"/>
<path d="M621,874 V888 H635" fill="none" stroke="black" stroke-width="1"/>
<text x="467" y="896" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">cancelar() →</text>
<text x="467" y="910" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">UPDATE reservas SET</text>
<text x="467" y="924" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">estado='cancelado'</text>
<text x="467" y="938" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">eliminar() →</text>
<text x="467" y="952" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">DELETE FROM reservas</text>
<text x="467" y="966" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="black">WHERE id = ?</text>
<line x1="545" y1="858" x2="545" y2="874" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
